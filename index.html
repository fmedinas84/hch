<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantalla LED Hipódromo de Chile — Publimetal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── PALETA ÚNICA: Azul neón + Negro ── */
      --neon: #00C8FF;           /* azul neón primario */
      --neon-dim: rgba(0,200,255,0.12);
      --neon-border: rgba(0,200,255,0.25);
      --neon-glow: rgba(0,200,255,0.15);
      --neon-bright: #40D8FF;
      --neon-dark: #0090CC;

      --black: #040608;
      --dark: #080C10;
      --panel: #0C1118;
      --panel2: #101620;
      --panel3: #141C28;
      --line: rgba(0,200,255,0.1);
      --line-dim: rgba(255,255,255,0.05);

      --white: #F0F8FF;
      --muted: rgba(160,200,220,0.55);
      --muted2: rgba(160,200,220,0.35);

      --green: #00FF88;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════
       NAV
    ═══════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 48px;
      background: linear-gradient(to bottom, rgba(4,6,8,0.97) 0%, rgba(4,6,8,0) 100%);
      border-bottom: 1px solid rgba(0,200,255,0.06);
    }
    .nav-logos { display: flex; align-items: center; gap: 16px; }
    .nav-brand {
      font-size: 12px; font-weight: 700; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--neon);
    }
    .nav-sep { width: 1px; height: 20px; background: var(--neon-border); }
    .nav-sub { font-size: 11px; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .nav-cta {
      font-size: 11px; font-weight: 600; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--black);
      text-decoration: none;
      background: var(--neon);
      padding: 9px 22px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .nav-cta:hover { background: var(--neon-bright); box-shadow: 0 0 20px rgba(0,200,255,0.4); }

    /* ═══════════════════════════════
       HERO
    ═══════════════════════════════ */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: flex-end; align-items: flex-start;
      padding: 0 0 0 0;
      overflow: hidden;
    }

    /* Video / imagen fondo */
    .hero-media {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .hero-media-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Overlay azul-negro sobre el fondo */
    .hero-overlay {
      position: absolute; inset: 0; z-index: 1;
      background:
        linear-gradient(to right, rgba(4,6,8,0.95) 40%, rgba(4,6,8,0.3) 100%),
        linear-gradient(to top, rgba(4,6,8,0.9) 0%, transparent 50%);
    }

    /* Grid de scanlines LED */
    .hero-scanlines {
      position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
    }

    /* Glow neón en esquina superior derecha */
    .hero-glow {
      position: absolute; top: -10%; right: -5%; z-index: 1;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,200,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-content {
      position: relative; z-index: 3;
      padding: 140px 64px 80px;
      max-width: 700px;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--neon);
      margin-bottom: 32px;
      padding: 7px 18px;
      border: 1px solid var(--neon-border);
      background: var(--neon-dim);
    }
    .dot-live {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: blink 2s ease infinite;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(44px, 6vw, 82px);
      font-weight: 900; line-height: 1.05;
      letter-spacing: -0.02em; color: var(--white);
      margin-bottom: 12px;
    }
    .hero h1 em { font-style: normal; color: var(--neon); }

    .hero-sub {
      font-family: 'Playfair Display', serif;
      font-size: clamp(18px, 2.5vw, 28px);
      font-style: italic; font-weight: 400;
      color: rgba(240,248,255,0.6);
      margin-bottom: 32px;
    }

    .hero-desc {
      font-size: 15px; font-weight: 300; line-height: 1.85;
      color: var(--muted); max-width: 480px; margin-bottom: 44px;
    }

    .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }

    .btn-primary {
      background: var(--neon); color: var(--black);
      font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; text-decoration: none;
      padding: 15px 32px; display: inline-block;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      border: none; cursor: pointer;
    }
    .btn-primary:hover {
      background: var(--neon-bright);
      box-shadow: 0 0 24px rgba(0,200,255,0.5);
      transform: translateY(-1px);
    }
    .btn-ghost {
      border: 1px solid var(--neon-border);
      color: var(--neon); background: var(--neon-dim);
      font-size: 11px; font-weight: 600; letter-spacing: 0.2em;
      text-transform: uppercase; text-decoration: none;
      padding: 15px 32px; display: inline-block;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .btn-ghost:hover {
      background: rgba(0,200,255,0.18);
      border-color: var(--neon);
      box-shadow: 0 0 16px rgba(0,200,255,0.2);
    }

    /* Badge derecho del hero (floating) */
    .hero-badge {
      position: absolute; bottom: 60px; right: 60px; z-index: 3;
      background: var(--panel2);
      border: 1px solid var(--neon-border);
      padding: 20px 28px;
      display: flex; flex-direction: column; gap: 6px;
      box-shadow: 0 0 30px rgba(0,200,255,0.1);
    }
    .hero-badge-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted2); }
    .hero-badge-val {
      font-family: 'Playfair Display', serif;
      font-size: 32px; font-weight: 700; color: var(--neon);
      line-height: 1; text-shadow: 0 0 20px rgba(0,200,255,0.5);
    }
    .hero-badge-unit { font-size: 11px; color: var(--muted); }

    /* ═══════════════════════════════
       STATS STRIP
    ═══════════════════════════════ */
    .stats-strip {
      background: var(--panel);
      border-top: 1px solid var(--neon-border);
      border-bottom: 1px solid var(--neon-border);
      display: grid; grid-template-columns: repeat(4, 1fr);
    }
    .stat-item {
      padding: 36px 24px; text-align: center;
      border-right: 1px solid var(--line-dim);
      position: relative;
    }
    .stat-item:last-child { border-right: none; }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 44px; font-weight: 700; color: var(--neon);
      line-height: 1; margin-bottom: 6px;
      text-shadow: 0 0 20px rgba(0,200,255,0.4);
    }
    .stat-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
    }

    /* ═══════════════════════════════
       SECTION BASE
    ═══════════════════════════════ */
    section { padding: 96px 64px; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--neon);
      margin-bottom: 18px; display: flex; align-items: center; gap: 12px;
    }
    .section-label::after {
      content: ''; flex: 1; max-width: 40px; height: 1px;
      background: var(--neon-border);
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 4vw, 50px);
      font-weight: 700; line-height: 1.15; color: var(--white);
      margin-bottom: 20px;
    }
    .section-body {
      font-size: 15px; font-weight: 300;
      color: var(--muted); line-height: 1.9; max-width: 600px;
    }

    /* ═══════════════════════════════
       ANTES / DESPUÉS
    ═══════════════════════════════ */
    .antes-despues { background: var(--dark); }
    .ad-grid {
      display: grid; grid-template-columns: 1fr 52px 1fr;
      gap: 0; align-items: center; margin-top: 52px;
    }
    .ad-card { background: var(--panel2); border: 1px solid var(--line-dim); overflow: hidden; }
    .ad-card-header {
      padding: 14px 22px; border-bottom: 1px solid var(--line-dim);
      display: flex; align-items: center; gap: 12px;
    }
    .ad-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; padding: 4px 10px;
    }
    .ad-badge.antes { background: rgba(255,255,255,0.05); color: var(--muted); }
    .ad-badge.despues { background: var(--neon-dim); color: var(--neon); border: 1px solid var(--neon-border); }
    .ad-card-title { font-size: 13px; font-weight: 500; color: var(--white); }
    .ad-visual { aspect-ratio: 16/9; position: relative; overflow: hidden; }
    .ad-visual img {
